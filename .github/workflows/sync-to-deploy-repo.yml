name: Sync to deploy repo

on:
  push:
    branches:
      - main

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Push main to deploy repository
        env:
          DEPLOY_REPO_TOKEN: ${{ secrets.DEPLOY_REPO_TOKEN }}
          DEPLOY_REPO: binhpv96/myth-of-dreams
        run: |
          if [ -z "$DEPLOY_REPO_TOKEN" ]; then
            echo "DEPLOY_REPO_TOKEN is missing"
            exit 1
          fi

          git remote add deploy https://x-access-token:${DEPLOY_REPO_TOKEN}@github.com/${DEPLOY_REPO}.git
          git push deploy main:main --force
